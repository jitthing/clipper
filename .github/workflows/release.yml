name: Build & Release (macOS)

on:
  pull_request:
    branches: [main]
  push:
    tags:
      - "v*"
  workflow_dispatch:

jobs:
  preview-macos:
    name: Build macOS preview artifacts
    if: github.event_name == 'pull_request' || github.event_name == 'workflow_dispatch'
    runs-on: macos-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build Tauri app bundles
        run: npm run tauri build

      - name: Upload macOS bundle artifacts
        uses: actions/upload-artifact@v4
        with:
          name: snaplark-macos-preview-${{ github.sha }}
          path: |
            src-tauri/target/release/bundle/dmg/*.dmg
            src-tauri/target/release/bundle/macos/*.app
          if-no-files-found: error

  release-macos:
    name: Publish macOS release
    if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v')
    runs-on: macos-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build + publish release assets
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tagName: ${{ github.ref_name }}
          releaseName: "Snaplark ${{ github.ref_name }}"
          releaseBody: "See the [changelog](https://github.com/jitthing/snaplark/blob/main/CHANGELOG.md) for details."
          releaseDraft: true
          prerelease: false
