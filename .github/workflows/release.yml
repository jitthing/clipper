name: Build & Release (macOS)

on:
  pull_request:
    branches: [main]
    paths:
      - '.github/workflows/release.yml'
      - '.github/workflows/ci.yml'
      - 'src/**'
      - 'src-tauri/**'
      - 'index.html'
      - 'package.json'
      - 'package-lock.json'
      - 'postcss.config.js'
      - 'tailwind.config.js'
      - 'tsconfig.json'
      - 'tsconfig.node.json'
      - 'tsconfig.test.json'
      - 'vite.config.ts'
      - 'Casks/clipper.rb'
  push:
    tags:
      - "v*"
  workflow_dispatch:

jobs:
  preview-macos:
    name: Build macOS preview artifacts
    if: github.event_name == 'pull_request' || github.event_name == 'workflow_dispatch'
    runs-on: macos-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build Tauri app bundles
        run: npm run tauri build

      - name: Ad-hoc sign the .app bundle
        run: |
          APP_PATH=$(find src-tauri/target/release/bundle/macos -name "*.app" -maxdepth 1 | head -1)
          if [ -n "$APP_PATH" ]; then
            echo "Signing $APP_PATH..."
            codesign --force --sign - "$APP_PATH"
            echo "✅ Ad-hoc signed: $APP_PATH"
            codesign --verify --deep --strict "$APP_PATH"
            echo "✅ Signature verified"
          fi

      - name: Re-create DMG with signed app
        run: |
          APP_PATH=$(find src-tauri/target/release/bundle/macos -name "*.app" -maxdepth 1 | head -1)
          DMG_DIR="src-tauri/target/release/bundle/dmg"
          if [ -n "$APP_PATH" ]; then
            APP_NAME=$(basename "$APP_PATH" .app)
            # Remove ALL existing DMGs and recreate with the signed app
            ORIG_DMG=$(find "$DMG_DIR" -name "*.dmg" | head -1)
            echo "Original DMG: $ORIG_DMG"
            rm -f "$DMG_DIR"/*.dmg
            hdiutil create -volname "$APP_NAME" -srcfolder "$APP_PATH" -ov -format UDZO "$ORIG_DMG"
            echo "✅ DMG recreated (overwritten) with signed app: $ORIG_DMG"
          fi

      - name: Upload macOS bundle artifacts
        uses: actions/upload-artifact@v4
        with:
          name: clipper-macos-preview-${{ github.sha }}
          path: |
            src-tauri/target/release/bundle/dmg/*.dmg
            src-tauri/target/release/bundle/macos/*.app
          if-no-files-found: error

  release-macos:
    name: Publish macOS release
    if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v')
    runs-on: macos-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build Tauri app bundles
        run: npm run tauri build

      - name: Ad-hoc sign the .app bundle
        run: |
          APP_PATH=$(find src-tauri/target/release/bundle/macos -name "*.app" -maxdepth 1 | head -1)
          if [ -n "$APP_PATH" ]; then
            echo "Signing $APP_PATH..."
            codesign --force --sign - "$APP_PATH"
            echo "✅ Ad-hoc signed: $APP_PATH"
            codesign --verify --deep --strict "$APP_PATH"
            echo "✅ Signature verified"
          fi

      - name: Re-create DMG with signed app
        run: |
          APP_PATH=$(find src-tauri/target/release/bundle/macos -name "*.app" -maxdepth 1 | head -1)
          DMG_DIR="src-tauri/target/release/bundle/dmg"
          if [ -n "$APP_PATH" ]; then
            APP_NAME=$(basename "$APP_PATH" .app)
            # Overwrite the ORIGINAL DMG so tauri-action uploads the signed version
            ORIG_DMG=$(find "$DMG_DIR" -name "*.dmg" | head -1)
            echo "Original DMG: $ORIG_DMG"
            rm -f "$DMG_DIR"/*.dmg
            hdiutil create -volname "$APP_NAME" -srcfolder "$APP_PATH" -ov -format UDZO "$ORIG_DMG"
            echo "✅ DMG recreated (overwritten) with signed app: $ORIG_DMG"
          fi

      - name: Publish release assets
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tagName: ${{ github.ref_name }}
          releaseName: "Clipper ${{ github.ref_name }}"
          releaseBody: |
            See the [changelog](https://github.com/jitthing/clipper/blob/main/CHANGELOG.md) for details.

            ## Install via Homebrew
            ```bash
            brew tap jitthing/clipper https://github.com/jitthing/clipper --force
            brew install --cask clipper
            ```

            > **Manual install note:** This app is ad-hoc signed. On first launch, right-click the app → Open (instead of double-clicking).
          releaseDraft: true
          prerelease: false
          tauriScript: "echo skip"

      - name: Update Homebrew cask on main
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          DMG_PATH=$(find src-tauri/target/release/bundle/dmg -name "*.dmg" | head -1)
          if [ -z "$DMG_PATH" ]; then
            echo "⚠️ No DMG found, skipping cask update"
            exit 0
          fi
          SHA=$(shasum -a 256 "$DMG_PATH" | awk '{print $1}')
          DMG_NAME=$(basename "$DMG_PATH")
          echo "Version: $VERSION | SHA: $SHA | DMG: $DMG_NAME"

          printf 'cask "clipper" do\n  version "%s"\n  sha256 "%s"\n\n  url "https://github.com/jitthing/clipper/releases/download/v#{version}/%s"\n  name "Clipper"\n  desc "Screenshot tool with smart window detection and inline annotations"\n  homepage "https://github.com/jitthing/clipper"\n\n  depends_on macos: ">= :ventura"\n\n  app "Clipper.app"\n\n  postflight do\n    system_command "/usr/bin/xattr",\n                   args: ["-dr", "com.apple.quarantine", "#{appdir}/Clipper.app"],\n                   sudo: false\n  end\n\n  zap trash: [\n    "~/Library/Application Support/com.clipper.app",\n    "~/Library/Preferences/com.clipper.app.plist",\n  ]\nend\n' "$VERSION" "$SHA" "$DMG_NAME" > Casks/clipper.rb

          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add Casks/clipper.rb
          git diff --cached --quiet && echo "No changes" && exit 0
          git commit -m "chore: bump cask to v$VERSION"
          git push origin HEAD:main
          echo "✅ Cask updated to v$VERSION on main"
